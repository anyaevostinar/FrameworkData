### MAIN ###
# Global Settings

set SEED 3                      # What value should the random seed be? If seed <= 0, then it is randomly re-chosen.
set DATA_INT 200                  # How frequently, in updates, should data print?
set VERTICAL_TRANSMISSION 0       # Value 0 to 1 of probability of symbiont vertically transmitting when host reproduces
set WORLD_HEIGHT 100                    # Width of the world, just multiplied by the height to get total size
set WORLD_WIDTH 100                    # Height of world, just multiplied by width to get total size
set POP_SIZE -1                   # Starting size of the host population, -1 for full starting population
set START_MOI 1                   # Ratio of symbionts to hosts that experiment should start with
set UPDATES 100000                 # Number of updates to run before quitting
set HORIZ_TRANS 1                 # Should non-lytic horizontal transmission occur? 0 for no, 1 for yes
set HOST_REPRO_RES 3.5             # How many resources required for host reproduction
set SYM_HORIZ_TRANS_RES 1        # How many resources required for symbiont non-lytic horizontal transmission
set SYM_VERT_TRANS_RES 0          # How many resources required for symbiont vertical transmission
set GRID 0                        # Do offspring get placed immediately next to parents on grid, same for symbiont spreading
set SYM_INFECTION_CHANCE 1        # The chance (between 0 and 1) that a sym will infect a parallel host on process
set SYM_INFECTION_FAILURE_RATE 0  # The chance (between 0 and 1) that a sym will be killed by the world while trying to infect a host
set HOST_AGE_MAX 10000              # The maximum number of updates hosts are allowed to live, -1 for infinite
set SYM_AGE_MAX -1                # The maximum updates symbionts are allowed to live, -1 for infinite
set PHYLOGENY 0                   # Should the world keep track of host and symbiont phylogenies? (0 for no, 1 for yes)
set NUM_PHYLO_BINS 5              # How many bins should organisms be sepeated into if phylogeny is on?
set NO_MUT_UPDATES 0              # How many updates should be run after the end of UPDATES with all mutation turned off?
set PHAGE_EXCLUDE 0               # Do symbionts have a decreasing chance of getting into the host the more symbionts are already infecting it? (0 for no, 1 for yes)
set OUSTING 1                     # Should ousting (incoming symbiont kills and replaces existing symbiont) be turned on? (0 for no, 1 for yes)
set FILE_PATH output/             # Output file path
set FILE_NAME _data               # Root output file name
set DOMINANT_COUNT 10             # Number of dominant hosts to select

### MUTATION ###
# Mutation

set MUTATION_SIZE 0.0000      # Standard deviation of the distribution to mutate by

### SGP ###
# Complex Genomes Settings
set CYCLES_PER_UPDATE 16                              # Number of CPU cycles that organisms run every update
set FIND_NEIGHBOR_HOST_ATTEMPTS 5                    # How many times to attempt finding a neighboring host for symbiont to horizontally transmit into
set VT_TASK_MATCH 0                                  # Should task matching be required for vertical transmission? (0 for no, 1 for yes)
set TASK_PROFILE_MODE self-all                   # What should we use for task profiles for host-symbiont compatibility, preferential ousting, etc.?
# set HOST_SYM_COMPATIBILITY_MODE task-stronger-match  # How is compatibility determined for hosts/symbiont for transmission? always, task-any-match, task-stronger-match
set TASK_PROFILE_COMPATIBILITY_MODE task-any-match
set HORIZONTAL_TRANSMISSION_COMPATIBILITY_MODE task-profile-strictly-stronger-match
set HOST_MIN_CYCLES_BEFORE_REPRO 100
set SYM_MIN_CYCLES_BEFORE_REPRO 10

### SGP_MUTATION ###
# SGP mutation group

set SGP_MUT_PER_BIT_RATE 0.005  # Per-bit mutation rate for sgp programs

### NUTRIENT ###
# Nutrient interaction settings

set ENABLE_NUTRIENT 1                   # Nutrient interactions enabled?
set NUTRIENT_TYPE parasite             # What kind of nutrient symbionts are used?
set NUTRIENT_DONATE_PROP 0.75            # When symbiont donates resources to a host, what proportion is donated?
set NUTRIENT_STEAL_PROP 0.75             # When symbiont steals resources from a host, what proportion is stolen?
set NUTRIENT_INTERACTION_MULTIPLIER 1   # Multiplier to apply to gain amount
set PARASITE_BASE_TASK_VALUE_PROP 0.0  # Proportion of task value (defined by environment) that parasites receive when they fail to interact with their host.

### TASK_ENVIRONMENT ###
# Task environment settings

set TASK_ENV_CFG_PATH flat-reward-2-env.json  # Json file that provides environment configuration
set TASK_IO_BANK_SIZE 10000            # How many possible task input/output combinations to pre-generate?
set TASK_IO_UNIQUE_OUTPUT 1             # Should each output in the pregenerated io combinations be unique?
set HOST_ONLY_FIRST_TASK_CREDIT 0            # Only give organism credit for one task (whatever they do first)?
set SYM_ONLY_FIRST_TASK_CREDIT 1

### DATA ###
# Data settings

set PRINT_INTERVAL 100  # How often to print run status
